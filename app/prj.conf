# Sensor and SPI
CONFIG_SENSOR=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_ADS1299=y
CONFIG_ADS1299_TRIGGER=y

# USB CDC ACM for data streaming
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="EEG Acquisition Device"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0001

# Serial / Console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Stack
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# SPI DMA buffer for nRF
CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=96
